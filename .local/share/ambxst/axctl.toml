[startup]
exec-once = "ambxst"
[appearance]
[appearance.gaps]
inner = 2
outer = 4
[appearance.border]
width = 2
active_color = "rgb(ffb59e)"
inactive_color = "rgb(181616)"
rounding = 16
[appearance.opacity]
active = 1.0
inactive = 1.0
[appearance.blur]
enabled = true
size = 4
passes = 2
[appearance.shadow]
enabled = true
size = 8
color = "rgba(00000080)"
[appearance.animations]
enabled = true

[general]
layout = "dwindle"

