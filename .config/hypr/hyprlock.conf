background {
    monitor =
    path = ~/Pictures/Wallpapers/forest-dark.jpg
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.7
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(136, 192, 208, 0.8)
    inner_color = rgba(30, 30, 46, 0.7)
    font_color = rgb(229, 233, 240)
    fade_on_empty = true
    placeholder_text = <i>Passwort…</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(229, 233, 240, 0.95)
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %e. %B')"
    color = rgba(229, 233, 240, 0.85)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
