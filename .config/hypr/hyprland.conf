# ============================================================================
#  Hyprland Config — diego
#  Ambxst wird unten als Basis geladen, darunter folgen persönliche Overrides.
# ============================================================================

# Ambxst
source = ~/.local/share/ambxst/hyprland.conf

# ============================================================================
#  OVERRIDES
# ============================================================================

# ----- Monitor (automatische Erkennung, fallback preferred) -----
monitor = , preferred, auto, 1

# ----- Eingabe: Schweizerdeutsches Layout -----
input {
    kb_layout = ch
    kb_variant =
    kb_options =
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

# ----- General: Gaps, Border -----
general {
    gaps_in = 8
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(88c0d0ee) rgba(5e81acee) 45deg
    col.inactive_border = rgba(3b4252aa)
    layout = dwindle
    allow_tearing = false
}

# ----- Decoration: Rundung, Blur, Transparenz -----
decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# ----- Animationen -----
animations {
    enabled = true

    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    bezier = overshoot, 0.05, 0.9, 0.1, 1.1
    bezier = snappy, 0.2, 1, 0.2, 1

    animation = windows, 1, 5, overshoot, slide
    animation = windowsOut, 1, 4, smooth, slide
    animation = border, 1, 8, smooth
    animation = borderangle, 1, 10, smooth
    animation = fade, 1, 6, smooth
    animation = workspaces, 1, 5, snappy, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
}

# ----- Tastenkürzel -----
$mainMod = SUPER

bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, E, exec, dolphin
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating,
bind = $mainMod, M, exit,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# Fokus wechseln
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Fenster verschieben
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Workspaces 1-9
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Fenster zu Workspace verschieben
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Scrollen durch Workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Drag / Resize mit Maus
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshot
bind = , Print, exec, flameshot gui

# Helligkeit / Lautstärke
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
binde = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Lockscreen
bind = $mainMod, L, exec, hyprlock

# ----- Autostart -----
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = ambxst
